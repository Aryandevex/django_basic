{% extends "coreapp/base.html" %}
{% block title %}Delete Member{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Delete Member</h1>
</div>

<div class="card" style="max-width:500px;">
  <div class="alert alert-warning">
    ⚠️ Are you sure you want to delete member <strong>{{ object.user.username }}</strong>?
    <br>This will also permanently delete their user account.
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'member-list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
